name: manylinux

on: [push, pull_request]

jobs:
  # NOTE: manylinux2014 i686 does not have an EPEL repo necessary to install cmake3
  #       32-bit is slowly dying, so I think this should be ok.
  #       Once manylinux2014 is EOLd we can switch to manylinux_2_24 which will probably work better
  manylinux2010:
    name: "manylinux2010(${{ matrix.python-version }}, ${{ matrix.container-image }})"
    runs-on: ubuntu-latest
    container: ${{ matrix.container-image }}
    strategy:
      matrix:
        python-version: ['cp37-cp37m', 'cp38-cp38', 'cp39-cp39']
        container-image: ['quay.io/pypa/manylinux2010_i686']
      fail-fast: false
    env:
      py: /opt/python/${{ matrix.python-version }}/bin/python
    steps:
    # NOTE: Cannot use checkout@v2 as it requires a newer version glibc, but that's not possible with manylinux without a secondary sysroot
    - uses: actions/checkout@v1
    # capnproto build requires cmake 3+, CentOS 6 (manylinux2010) defaults to cmake 2.8
    - name: Install dependencies
      run: |
        yum install -y cmake3 ninja-build
        ln -sf /usr/bin/cmake3 /usr/local/bin/cmake
        ln -s /usr/bin/ninja-build /usr/local/bin/ninja
        ${{ env.py }} -m pip install -r requirements.txt
        ${{ env.py }} -m pip install auditwheel
    - name: Build pycapnp and install
      env:
        LDFLAGS: -Wl,--no-as-needed -lrt
      run: |
        ${{ env.py }} setup.py build
    - name: Packaging
      run: |
        ${{ env.py }} setup.py bdist_wheel
        ${{ env.py }} setup.py sdist
        ${{ env.py }} -m auditwheel repair dist/*linux_*.whl
    - uses: actions/upload-artifact@v1.0.0
      with:
        name: manylinux2010_dist
        path: wheelhouse

  manylinux2014:
    name: "manylinux2014(${{ matrix.python-version }}, ${{ matrix.container-image }})"
    runs-on: ubuntu-latest
    container: ${{ matrix.container-image }}
    strategy:
      matrix:
        python-version: ['cp37-cp37m', 'cp38-cp38', 'cp39-cp39']
        container-image: ['quay.io/pypa/manylinux2014_x86_64', 'quay.io/pypa/manylinux2014_i686']
      fail-fast: false
    env:
      py: /opt/python/${{ matrix.python-version }}/bin/python
    steps:
    # NOTE: Cannot use checkout@v2 as it requires a newer version glibc, but that's not possible with manylinux without a secondary sysroot
    - uses: actions/checkout@v1
    # capnproto build requires cmake 3+, CentOS 7 (manylinux2014) defaults to cmake 2.8
    - name: Install dependencies
      run: |
        yum install -y cmake3 ninja-build
        ln -sf /usr/bin/cmake3 /usr/local/bin/cmake
        ln -s /usr/bin/ninja-build /usr/local/bin/ninja
        ${{ env.py }} -m pip install -r requirements.txt
        ${{ env.py }} -m pip install auditwheel
    - name: Build pycapnp and install
      #env:
      #  LDFLAGS: -Wl,--no-as-needed -lrt
      run: |
        ${{ env.py }} setup.py build
    - name: Packaging
      run: |
        ${{ env.py }} setup.py bdist_wheel
        ${{ env.py }} setup.py sdist
        ${{ env.py }} -m auditwheel repair dist/*linux_*.whl
    - uses: actions/upload-artifact@v1.0.0
      with:
        name: manylinux2014_dist
        path: wheelhouse

  manylinux2014qemu:
    name: "manylinux2014qemu(${{ matrix.python-version }}, ${{ matrix.container-image }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['cp37-cp37m', 'cp38-cp38', 'cp39-cp39']
        img: ['quay.io/pypa/manylinux2014_aarch64']
      fail-fast: false
    env:
      py: /opt/python/${{ matrix.python-version }}/bin/python
    steps:
    # NOTE: Cannot use checkout@v2 as it requires a newer version glibc, but that's not possible with manylinux without a secondary sysroot
    - uses: actions/checkout@v1
    - name: Set up QEMU
      id: qemu
      uses: docker/setup-qemu-action@v1
    - name: Building pycapnp and packaging
      run: |
        docker run --rm -v ${{ github.workspace }}:/ws:rw --workdir=/ws \
        ${{ env.img }} \
        bash -exc '${{ env.py }} -m venv .env && \
        source .env/bin/activate && \
        echo "Install Dependencies" && \
        python -m pip install -r requirements.txt && \
        python -m pip install auditwheel && \
        echo "Build pycapnp and install" && \
        python setup.py build && \
        echo "Packaging" && \
        python setup.py bdist_wheel && \
        python setup.py sdist && \
        auditwheel repair dist/*linux_*.whl && \
        deactivate'
    - uses: actions/upload-artifact@v1.0.0
      with:
        name: manylinux2014_dist
        path: wheelhouse
